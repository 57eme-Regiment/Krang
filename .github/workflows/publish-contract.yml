name: Publish API Contract

on:
  push:
    paths:
      - 'API/packages/contract/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@57eme-regiment'

      - name: Auto-bump minor version (main)
        if: github.ref == 'refs/heads/main'
        working-directory: API/packages/contract
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @57eme-regiment/krang-api-contract version --registry https://npm.pkg.github.com 2>/dev/null || echo "none")
          echo "Local version: $LOCAL"
          echo "Published version: $PUBLISHED"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "Versions match — bumping minor"
            npm version minor --no-git-tag-version
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "chore: bump contract minor version [skip ci]"
            git push
          else
            echo "Local version differs from published — skipping auto-bump"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        working-directory: API
        run: pnpm install --frozen-lockfile

      - name: Build contract
        working-directory: API
        run: pnpm --filter @57eme-regiment/krang-api-contract build

      - name: Publish stable (main)
        if: github.ref == 'refs/heads/main'
        working-directory: API/packages/contract
        run: pnpm publish --no-git-checks --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute beta version
        if: github.ref != 'refs/heads/main'
        id: beta_version
        working-directory: API/packages/contract
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          BETA_VERSION="${CURRENT}-beta.${{ github.run_number }}"
          echo "version=$BETA_VERSION" >> $GITHUB_OUTPUT

      - name: Publish beta (non-main branches)
        if: github.ref != 'refs/heads/main'
        working-directory: API/packages/contract
        run: |
          npm version ${{ steps.beta_version.outputs.version }} --no-git-tag-version
          pnpm publish --no-git-checks --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
