info:
  name: WarReport
  type: http
  seq: 3

http:
  method: GET
  url: "{{process.env.WAR_API_BASE}}/warReport/{{MapName}}"
  auth: inherit

runtime:
  variables:
    - name: MapName
      value: ClansheadValleyHex

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
