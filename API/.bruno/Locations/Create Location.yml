info:
  name: Create Location
  type: http
  seq: 3

http:
  method: POST
  url: "{{BaseUrl}}/api/locations"
  body:
    type: json
    data: |-
      {
        "type": "STORAGE_DEPOT",
        "faction": "COLONIAL",
        "iconType": 0,
        "flags": 0,
        "viewDirection": 0,
        "longitude": 0.312,
        "latitude": 0.512,
        "townId": "00000000-0000-0000-0000-000000000000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
