info:
  name: Update Region
  type: http
  seq: 5

http:
  method: PUT
  url: "{{BaseUrl}}/api/regions/{{regionId}}"
  body:
    type: json
    data: |-
      {
        "name": "Deadlands Updated",
        "gameRegionId": 2
      }
  auth: inherit

runtime:
  variables:
    - name: regionId
      value: 00000000-0000-0000-0000-000000000000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
