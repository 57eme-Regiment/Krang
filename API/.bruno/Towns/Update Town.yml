info:
  name: Update Town
  type: http
  seq: 4

http:
  method: PUT
  url: "{{BaseUrl}}/api/towns/{{townId}}"
  body:
    type: json
    data: |-
      {
        "name": "Abandoned Ward Updated",
        "longitude": 0.320,
        "latitude": 0.520
      }
  auth: inherit

runtime:
  variables:
    - name: townId
      value: 00000000-0000-0000-0000-000000000000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
